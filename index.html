<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spider-Man London Server</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(rgba(0,0,0,0.7),
    rgba(0,0,0,0.7)),
    url('https://images.unsplash.com/photo-1513635269975-59663e0ac1ad');
    background-size: cover;
    background-position: center;
    height:100vh;
    color:white;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.card{
    background:rgba(0,0,0,0.6);
    padding:40px;
    border-radius:15px;
    box-shadow:0 0 25px rgba(255,0,0,0.6);
    max-width:700px;
}

h1{
    color:#ff0000;
    font-size:60px;
    margin-bottom:20px;
}

h2{
    color:#ffffff;
    margin-bottom:20px;
}

p{
    font-size:20px;
    margin:10px 0;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:#ff0000;
    color:white;
    text-decoration:none;
    border-radius:5px;
    font-weight:bold;
}

.btn:hover{
    background:#cc0000;
}
</style>
</head>

<body>

<div class="container">
    <div class="card">
        <h1>🕷 Spider-Man Server</h1>
        <h2>🇬🇧 London Web Project</h2>

        <p>Hosted on AWS EC2</p>
        <p>Apache Web Server Running Successfully</p>
        <p>Deployed using GitHub & User Data Script</p>
        <p>With Great Power Comes Great Responsibility</p>

        <a href="#" class="btn">Welcome Hero</a>
    </div>
</div>

</body>
</html>
